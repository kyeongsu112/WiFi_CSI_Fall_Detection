# Example inference config for live ESP32-S3 deployment (v1 UDP path).
#
# Copy to configs/inference.local.yaml (untracked) and fill in your details.
# inference.local.yaml is listed in .gitignore — it is safe to store local
# secrets there.  Never commit the Wi-Fi password or device-specific IPs to
# any tracked file.
# Launch with:
#   python -m app dashboard --source esp32 --config configs/inference.local.yaml
#
# ── Wi-Fi setup ─────────────────────────────────────────────────────────────
# The ESP32-S3 and the laptop must be connected to the same Wi-Fi network.
# SSID and password are stored in the .env file (untracked).
# See .env.example for the expected format.
# The password is used only in ESP32 firmware, not by this Python server.
#
# ── Source mode ─────────────────────────────────────────────────────────────
# source_mode: esp32
#   Instructs the dashboard to use Esp32Source (inference/live_source.py).
#   Esp32Source opens a UDP socket, receives JSON packets from the ESP32-S3,
#   buffers them into 100-frame windows, and yields CsiWindow(data=(52, 100)).
#
# ── UDP transport ────────────────────────────────────────────────────────────
# esp32_udp_host: 0.0.0.0  — accept from any interface (usual for Wi-Fi AP)
# esp32_udp_port: 5005     — must match the target port configured on the ESP32
#
# To restrict to a specific NIC (e.g. the Wi-Fi adapter IP only):
#   esp32_udp_host: 192.168.X.Y   # your laptop's IP on the Wi-Fi network
#
# The laptop IP on the Wi-Fi network can be found with:
#   Windows: ipconfig         (look for the Wi-Fi adapter)
#   Linux:   ip addr show
#
# ── v1 Packet contract ───────────────────────────────────────────────────────
# Each UDP datagram is a single-line JSON object:
#
#   {"ts": 1712700000.123, "fi": 42, "amp": [f0, f1, …, f51], "sid": "dev-01"}
#
# Fields:
#   ts   float    Unix epoch seconds.                        Optional.
#   fi   int      Frame index, monotonically increasing.     Optional.
#   amp  list[float]  52 CSI subcarrier amplitudes.        **Required.**
#   sid  str      Device / session identifier.               Optional (default "esp32").
#
# Packets that are malformed (invalid JSON, wrong amp length, missing amp)
# are logged at WARNING level and dropped without crashing the server.
#
# ── Firmware guidance ────────────────────────────────────────────────────────
# Minimal Arduino/ESP-IDF snippet for sending one frame per CSI callback:
#
#   // In the CSI callback (pseudo-code):
#   char buf[512];
#   snprintf(buf, sizeof(buf),
#     "{\"ts\":%.3f,\"fi\":%d,\"amp\":[%.1f,%.1f,...,%.1f],\"sid\":\"dev-01\"}",
#     epoch_seconds(), frame_index++, amp[0], amp[1], ..., amp[51]);
#   udp_send(LAPTOP_IP, 5005, buf, strlen(buf));
#
#   // LAPTOP_IP = laptop IP on the Wi-Fi network
#   // Set via #define LAPTOP_IP "192.168.X.Y"  — keep out of committed firmware
#   // or read from NVS: nvs_get_str(handle, "laptop_ip", buf, &len)
#
# ── Window contract ──────────────────────────────────────────────────────────
# window_size:      100 frames    (100 consecutive CSI samples)
# subcarrier_count:  52 channels  (one amplitude per Wi-Fi subcarrier)
# Model input shape: (1, 52, 100) — batch=1, n_subcarriers=52, window_size=100
#
# ── Model ────────────────────────────────────────────────────────────────────
# model_path: artifacts/models/wifall_baseline.pt
#   Same checkpoint used in replay/mock_live modes.
#   The model returns raw logits; sigmoid is applied in InferencePipeline.
#
# ── Threshold guidance ───────────────────────────────────────────────────────
# candidate_threshold: 0.50 — validated on WiFall replay data.
#   Live ESP32 CSI will have a different noise floor and amplitude range.
#   Recommended: collect a live test set (use scripts/collect.py), then run
#   the threshold sweep in scripts/eval_baseline.py and update this value.

model_path: artifacts/models/wifall_baseline.pt
candidate_threshold: 0.50
source_mode: esp32

# --- UDP transport (esp32 source_mode) ---
esp32_udp_host: 0.0.0.0
esp32_udp_port: 5005

# --- Live ESP32 mode (time-based ConfirmationEngine in inference/confirmation.py) ---
post_fall_inactivity_seconds: 6
motion_floor_threshold: 0.15
confirm_window_seconds: 8
cooldown_seconds: 5
health_timeout_seconds: 5

# --- Replay / mock_live mode (not used in live mode, kept for schema completeness) ---
confirm_n_windows: 3
cooldown_windows: 10
step_delay_seconds: 0.05
