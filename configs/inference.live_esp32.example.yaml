# Example inference config for live ESP32 deployment.
# Copy to configs/inference.yaml and fill in your hardware details.
#
# ── Source mode ─────────────────────────────────────────────────────────────
# source_mode: esp32
#   Instructs the dashboard to use Esp32Source (inference/live_source.py).
#   NOT YET IMPLEMENTED — raises NotImplementedError until the UDP receiver
#   is wired up.  See inference/live_source.py Esp32Source for the contract.
#
# ── Transport ────────────────────────────────────────────────────────────────
# The ESP32 collector sends packets via UDP in esp32_adr018 format.
# See configs/collection.live_esp32.example.yaml for host/port settings.
# The live_source.Esp32Source implementation should:
#   1. Open a UDP socket matching collection.live_esp32.example.yaml udp_host/port.
#   2. Parse incoming esp32_adr018 packets using collector/packet_parser.py.
#   3. Buffer 100 consecutive CSI rows per node → one window.
#   4. Yield CsiWindow(data=(52, 100) float32, source_file="esp32://node-id").
#
# ── Window contract ──────────────────────────────────────────────────────────
# Expected model input shape: (1, 52, 100)
#   axis-0: batch size = 1 (single window per inference call)
#   axis-1: n_subcarriers = 52  (52 WiFi subcarrier amplitudes)
#   axis-2: window_size   = 100 (100 consecutive CSI samples)
#
# ── Model ───────────────────────────────────────────────────────────────────
# model_path: artifacts/models/wifall_baseline.pt
#   Same baseline checkpoint used in replay/mock_live modes.
#   Re-evaluate for live deployment — on-device amplitude distributions may
#   differ from WiFall CSV recordings and may require threshold re-tuning.
#
# ── Threshold guidance ───────────────────────────────────────────────────────
# candidate_threshold: 0.50 (validated on replay; re-tune for live hardware)
#   The replay model produces near-perfect bimodal separation on WiFall data.
#   Live ESP32 CSI will have different noise floor and amplitude range.
#   Recommended: collect a live test set, run the threshold sweep in
#   scripts/eval_baseline.py, then update this value.

model_path: artifacts/models/wifall_baseline.pt
candidate_threshold: 0.50
source_mode: esp32

# --- Live ESP32 mode (time-based ConfirmationEngine in inference/confirmation.py) ---
post_fall_inactivity_seconds: 6
motion_floor_threshold: 0.15
confirm_window_seconds: 8
cooldown_seconds: 5
# 5 s is long enough for smoke tests without flapping on Wi-Fi jitter
health_timeout_seconds: 5

# --- Replay / mock_live mode (not used in live mode, kept for schema completeness) ---
confirm_n_windows: 3
cooldown_windows: 10
step_delay_seconds: 0.05
