# WiFall 1D-CNN baseline training configuration
#
# Split source-of-truth
# ---------------------
# data.split_yaml_path points to the YAML generated by scripts/prepare_wifall.py.
# To change which subject is held out, edit configs/dataset.yaml
# (split.target_subject) and re-run:
#   python scripts/prepare_wifall.py
# Do NOT edit configs/splits/wifall_subject_split.yaml by hand.
#
# This file is intentionally separate from configs/training.yaml, which is
# owned by the shared/config.py TrainingConfig schema used by the live
# collection pipeline.

data:
  manifest_path: artifacts/processed/wifall_manifest.csv
  zip_path: data/WiFall.zip
  n_subcarriers: 52
  window_size: 100
  # Reads target_subject from the generated split file — single source of truth:
  split_yaml_path: configs/splits/wifall_subject_split.yaml

training:
  batch_size: 64
  epochs: 40
  learning_rate: 0.0005
  threshold: 0.5

model:
  conv_channels: [64, 128, 128]
  kernel_sizes: [5, 3, 3]
  dropout: 0.5

output:
  model_path:            artifacts/models/wifall_baseline.pt
  metrics_path:          artifacts/reports/wifall_baseline_metrics.json
  distribution_path:     artifacts/reports/wifall_baseline_subject_distribution.csv
  predictions_path:      artifacts/reports/wifall_baseline_predictions.csv
  confusion_matrix_path: artifacts/reports/wifall_baseline_confusion_matrix.png
  threshold_sweep_path:  artifacts/reports/wifall_baseline_threshold_sweep.csv
  roc_curve_path:        artifacts/reports/wifall_baseline_roc_curve.png
  pr_curve_path:         artifacts/reports/wifall_baseline_pr_curve.png
  score_distribution_path: artifacts/reports/wifall_baseline_score_distribution.csv
  score_histogram_path:  artifacts/reports/wifall_baseline_score_histogram.png
