# Inference configuration — source of truth for replay demo and live mode.
#
# candidate_threshold
#   Score (sigmoid probability) at or above which a window is labelled "fall"
#   and enters "candidate" alert state.
#
#   Chosen from Step 3 full-manifest replay score distribution:
#     Fall windows:     p25=0.971  p50=0.996  p90=0.999   (cluster near 1.0)
#     Non-fall windows: p25=0.000  p50=0.000  p90=0.474   (cluster near 0.0)
#   The two distributions are nearly disjoint; 0.50 sits in the empty gap.
#
#   t=0.50 replay stats: TP~897  FP~165  F1~0.899  recall~0.967

model_path: artifacts/models/wifall_baseline.pt
candidate_threshold: 0.50

# source_mode selects the CSI input source used by the dashboard.
#   replay    : read windows from the WiFall manifest + zip (default)
#   mock_live : generate synthetic random windows (no data files needed)
#   esp32     : live ESP32 JSON v1 UDP input
source_mode: replay

# --- ConfirmationEngine parameters (used by ALL source modes) ---
# These fields govern the time-based fall confirmation state machine
# (inference/confirmation.py ConfirmationEngine) for replay, mock_live,
# and esp32 sources alike.
post_fall_inactivity_seconds: 6   # seconds of low motion required to confirm
motion_floor_threshold: 0.15      # motion score <= this is counted as "inactive"
confirm_window_seconds: 8         # candidate window times out after this many seconds
cooldown_seconds: 5               # seconds to stay in cooldown before returning to idle
# health_timeout_seconds is only relevant for live ESP32 collection health checks
health_timeout_seconds: 5

# --- Replay pacing ---
step_delay_seconds: 0.05 # inter-window sleep for demo pacing (seconds)

# The fields below are accepted by the config schema but are NOT currently
# wired to the active ConfirmationEngine.  The time-based fields above
# (post_fall_inactivity_seconds, confirm_window_seconds, cooldown_seconds)
# govern all source modes.  These are retained for forward-compatibility.
confirm_n_windows: 3     # not consumed by the running inference path
cooldown_windows: 10     # not consumed by the running inference path
