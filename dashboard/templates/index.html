<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi CSI 이상상황 감지 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a2035;
            --border: #2a3555;
            --text-primary: #e8eaf6;
            --text-secondary: #8892b0;
            --accent-blue: #4f8cff;
            --accent-green: #00e676;
            --accent-red: #ff4757;
            --accent-orange: #ffa726;
            --accent-purple: #b388ff;
            --glow-blue: rgba(79, 140, 255, 0.15);
            --glow-red: rgba(255, 71, 87, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 배경 그라데이션 효과 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(79, 140, 255, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(179, 136, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        /* 헤더 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 28px;
            background: linear-gradient(135deg, var(--bg-card), #1e2a4a);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-sub {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), #3a6fd8);
            color: white;
            box-shadow: 0 4px 16px rgba(79, 140, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(79, 140, 255, 0.45);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--accent-red), #d63031);
            color: white;
            box-shadow: 0 4px 16px rgba(255, 71, 87, 0.3);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-radius: 8px;
            font-size: 13px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }

        .status-dot.alert {
            background: var(--accent-red);
            animation: pulse-alert 0.5s infinite;
        }

        .status-dot.idle {
            background: var(--text-secondary);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes pulse-alert {
            0%, 100% { opacity: 1; box-shadow: 0 0 12px var(--accent-red); }
            50% { opacity: 0.6; }
        }

        /* 그리드 레이아웃 */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover::before { opacity: 1; }

        .card-stat {
            text-align: center;
        }

        .card-stat .icon {
            font-size: 28px;
            margin-bottom: 10px;
            display: block;
        }

        .card-stat .value {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .card-stat .label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 메인 그리드 */
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 현재 상태 대형 표시 */
        .big-status {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }

        .big-status .activity-icon {
            font-size: 64px;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 20px rgba(79, 140, 255, 0.4));
        }

        .big-status .activity-name {
            font-size: 28px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .big-status .confidence {
            font-size: 16px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .big-status.anomaly {
            border-color: var(--accent-red);
            background: linear-gradient(135deg, var(--bg-card), #2a1520);
            box-shadow: 0 0 30px var(--glow-red);
        }

        .big-status.anomaly .activity-name {
            color: var(--accent-red);
        }

        /* 확률 바 */
        .prob-bars {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .prob-bar-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .prob-bar-label {
            width: 80px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .prob-bar-track {
            flex: 1;
            height: 10px;
            background: var(--bg-secondary);
            border-radius: 5px;
            overflow: hidden;
        }

        .prob-bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        .prob-bar-value {
            width: 50px;
            text-align: right;
            font-size: 13px;
            font-weight: 600;
        }

        /* 이벤트 로그 */
        .event-log {
            max-height: 340px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .event-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 13px;
            transition: background 0.2s;
        }

        .event-item:hover {
            background: var(--bg-secondary);
        }

        .event-item.anomaly {
            background: rgba(255, 71, 87, 0.1);
            border-left: 3px solid var(--accent-red);
        }

        .event-time {
            color: var(--text-secondary);
            font-size: 11px;
            min-width: 70px;
        }

        .event-badge {
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-walking { background: rgba(0, 230, 118, 0.15); color: var(--accent-green); }
        .badge-sitting { background: rgba(79, 140, 255, 0.15); color: var(--accent-blue); }
        .badge-lying { background: rgba(255, 167, 38, 0.15); color: var(--accent-orange); }
        .badge-falling { background: rgba(255, 71, 87, 0.2); color: var(--accent-red); }

        /* 차트 영역 */
        .chart-container {
            position: relative;
            width: 100%;
            height: 280px;
        }

        /* 반응형 */
        @media (max-width: 1024px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            .main-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <div class="header">
            <div>
                <h1>📡 Wi-Fi CSI 이상상황 감지 시스템</h1>
                <div class="header-sub">ESP32-S3 기반 비접촉 실내 모니터링</div>
            </div>
            <div class="header-controls">
                <div class="status-indicator">
                    <div class="status-dot idle" id="statusDot"></div>
                    <span id="statusText">대기 중</span>
                </div>
                <button class="btn btn-primary" id="btnStart" onclick="startSimulation()">▶ 시뮬레이션 시작</button>
                <button class="btn btn-danger" id="btnStop" onclick="stopDetection()" style="display:none;">■ 중지</button>
            </div>
        </div>

        <!-- 통계 카드 -->
        <div class="grid">
            <div class="card card-stat">
                <span class="icon">📊</span>
                <div class="value" id="totalCount">0</div>
                <div class="label">총 감지 횟수</div>
            </div>
            <div class="card card-stat">
                <span class="icon">🚨</span>
                <div class="value" id="anomalyCount" style="color: var(--accent-red)">0</div>
                <div class="label">이상 감지</div>
            </div>
            <div class="card card-stat">
                <span class="icon">⚡</span>
                <div class="value" id="avgTime">0<span style="font-size:16px">ms</span></div>
                <div class="label">평균 처리시간</div>
            </div>
            <div class="card card-stat">
                <span class="icon">🎯</span>
                <div class="value" id="avgConfidence">0<span style="font-size:16px">%</span></div>
                <div class="label">평균 신뢰도</div>
            </div>
        </div>

        <!-- 메인 영역 -->
        <div class="main-grid">
            <!-- 차트 -->
            <div class="card">
                <div class="card-title">📈 실시간 CSI 신호 & 분류</div>
                <div class="chart-container">
                    <canvas id="realtimeChart"></canvas>
                </div>
            </div>

            <!-- 현재 상태 -->
            <div class="card big-status" id="bigStatus">
                <div class="activity-icon" id="activityIcon">⏸️</div>
                <div class="activity-name" id="activityName">대기 중</div>
                <div class="confidence" id="confidenceText">-</div>
            </div>
        </div>

        <div class="main-grid">
            <!-- 클래스별 확률 -->
            <div class="card">
                <div class="card-title">📊 클래스별 확률 분포</div>
                <div class="prob-bars" id="probBars">
                    <div class="prob-bar-item">
                        <span class="prob-bar-label">Walking</span>
                        <div class="prob-bar-track">
                            <div class="prob-bar-fill" id="probWalking" style="width:0%; background: var(--accent-green);"></div>
                        </div>
                        <span class="prob-bar-value" id="probWalkingVal">0%</span>
                    </div>
                    <div class="prob-bar-item">
                        <span class="prob-bar-label">Sitting</span>
                        <div class="prob-bar-track">
                            <div class="prob-bar-fill" id="probSitting" style="width:0%; background: var(--accent-blue);"></div>
                        </div>
                        <span class="prob-bar-value" id="probSittingVal">0%</span>
                    </div>
                    <div class="prob-bar-item">
                        <span class="prob-bar-label">Lying</span>
                        <div class="prob-bar-track">
                            <div class="prob-bar-fill" id="probLying" style="width:0%; background: var(--accent-orange);"></div>
                        </div>
                        <span class="prob-bar-value" id="probLyingVal">0%</span>
                    </div>
                    <div class="prob-bar-item">
                        <span class="prob-bar-label">Falling</span>
                        <div class="prob-bar-track">
                            <div class="prob-bar-fill" id="probFalling" style="width:0%; background: var(--accent-red);"></div>
                        </div>
                        <span class="prob-bar-value" id="probFallingVal">0%</span>
                    </div>
                </div>

                <div style="margin-top: 24px;">
                    <div class="card-title">🍩 클래스 분포</div>
                    <div style="height: 200px;">
                        <canvas id="distributionChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 이벤트 로그 -->
            <div class="card">
                <div class="card-title">📋 최근 이벤트 로그</div>
                <div class="event-log" id="eventLog">
                    <div class="event-item">
                        <span class="event-time">--:--:--</span>
                        <span>시스템 대기 중...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let processingTimes = [];
        let confidences = [];
        let chartData = [];
        const MAX_CHART_POINTS = 60;

        // 아이콘 매핑
        const ICONS = {
            'walking': '🚶',
            'sitting': '🪑',
            'lying': '🛏️',
            'falling': '🚨',
            'unknown': '⏸️'
        };

        const COLORS = {
            'walking': '#00e676',
            'sitting': '#4f8cff',
            'lying': '#ffa726',
            'falling': '#ff4757'
        };

        // 실시간 차트 생성
        const ctx = document.getElementById('realtimeChart').getContext('2d');
        const realtimeChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: '신뢰도',
                    data: [],
                    borderColor: '#4f8cff',
                    backgroundColor: 'rgba(79, 140, 255, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }, {
                    label: '임계값',
                    data: [],
                    borderColor: 'rgba(255, 71, 87, 0.5)',
                    borderWidth: 1,
                    borderDash: [5, 5],
                    pointRadius: 0,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 100 },
                scales: {
                    y: { 
                        min: 0, max: 1,
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#8892b0' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#8892b0', maxTicksLimit: 10 }
                    }
                },
                plugins: {
                    legend: {
                        labels: { color: '#e8eaf6' }
                    }
                }
            }
        });

        // 분포 도넛 차트
        const distCtx = document.getElementById('distributionChart').getContext('2d');
        const distChart = new Chart(distCtx, {
            type: 'doughnut',
            data: {
                labels: ['Walking', 'Sitting', 'Lying', 'Falling'],
                datasets: [{
                    data: [0, 0, 0, 0],
                    backgroundColor: ['#00e676', '#4f8cff', '#ffa726', '#ff4757'],
                    borderWidth: 0,
                    spacing: 4,
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '65%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: '#e8eaf6', padding: 12, font: { size: 11 } }
                    }
                }
            }
        });

        // 감지 결과 수신
        socket.on('detection', function(data) {
            updateUI(data);
        });

        socket.on('status', function(data) {
            document.getElementById('statusText').textContent = data.message;
        });

        function updateUI(result) {
            const cls = result.predicted_class;
            const conf = result.confidence;
            const isAnomaly = result.is_anomaly;
            const time = new Date(result.timestamp).toLocaleTimeString('ko-KR');

            // 상태 표시
            document.getElementById('activityIcon').textContent = ICONS[cls] || '❓';
            document.getElementById('activityName').textContent = cls.toUpperCase();
            document.getElementById('activityName').style.color = COLORS[cls] || '#e8eaf6';
            document.getElementById('confidenceText').textContent = `신뢰도: ${(conf*100).toFixed(1)}%`;
            
            const bigStatus = document.getElementById('bigStatus');
            bigStatus.className = isAnomaly ? 'card big-status anomaly' : 'card big-status';

            // 상태 점
            const dot = document.getElementById('statusDot');
            dot.className = isAnomaly ? 'status-dot alert' : 'status-dot';
            document.getElementById('statusText').textContent = isAnomaly ? '이상 감지!' : '모니터링 중';

            // 통계 업데이트
            processingTimes.push(result.processing_time * 1000);
            confidences.push(conf);

            // 최근 값만 유지
            if (processingTimes.length > 100) processingTimes.shift();
            if (confidences.length > 100) confidences.shift();

            fetch('/api/status').then(r => r.json()).then(state => {
                document.getElementById('totalCount').textContent = state.stats.total;
                document.getElementById('anomalyCount').textContent = state.stats.anomaly_count;

                const avgTime = processingTimes.reduce((a,b)=>a+b, 0) / processingTimes.length;
                document.getElementById('avgTime').innerHTML = avgTime.toFixed(0) + '<span style="font-size:16px">ms</span>';

                const avgConf = confidences.reduce((a,b)=>a+b, 0) / confidences.length;
                document.getElementById('avgConfidence').innerHTML = (avgConf*100).toFixed(0) + '<span style="font-size:16px">%</span>';
            });

            // 확률 바 업데이트
            const probs = result.probabilities;
            ['walking', 'sitting', 'lying', 'falling'].forEach(c => {
                const p = probs[c] || 0;
                document.getElementById('prob' + c.charAt(0).toUpperCase() + c.slice(1)).style.width = (p*100)+'%';
                document.getElementById('prob' + c.charAt(0).toUpperCase() + c.slice(1) + 'Val').textContent = (p*100).toFixed(1)+'%';
            });

            // 분포 차트 업데이트 (실시간 확률 기반)
            distChart.data.datasets[0].data = [
                (probs.walking || 0) * 100,
                (probs.sitting || 0) * 100,
                (probs.lying || 0) * 100,
                (probs.falling || 0) * 100
            ];
            distChart.update('none');

            // 차트 업데이트
            realtimeChart.data.labels.push(time);
            realtimeChart.data.datasets[0].data.push(conf);
            realtimeChart.data.datasets[1].data.push(0.7);

            if (realtimeChart.data.labels.length > MAX_CHART_POINTS) {
                realtimeChart.data.labels.shift();
                realtimeChart.data.datasets[0].data.shift();
                realtimeChart.data.datasets[1].data.shift();
            }

            // 색상 변경
            realtimeChart.data.datasets[0].borderColor = COLORS[cls] || '#4f8cff';
            realtimeChart.data.datasets[0].backgroundColor = (COLORS[cls] || '#4f8cff') + '22';
            realtimeChart.update('none');

            // 이벤트 로그
            const eventLog = document.getElementById('eventLog');
            const eventHtml = `
                <div class="event-item ${isAnomaly ? 'anomaly' : ''}">
                    <span class="event-time">${time}</span>
                    <span>${ICONS[cls]}</span>
                    <span class="event-badge badge-${cls}">${cls}</span>
                    <span style="flex:1; text-align:right; color: var(--text-secondary);">
                        ${(conf*100).toFixed(1)}%
                    </span>
                </div>
            `;
            eventLog.insertAdjacentHTML('afterbegin', eventHtml);

            // 최대 50개 이벤트만 유지
            while (eventLog.children.length > 50) {
                eventLog.removeChild(eventLog.lastChild);
            }
        }

        function startSimulation() {
            socket.emit('start_simulation');
            document.getElementById('btnStart').style.display = 'none';
            document.getElementById('btnStop').style.display = 'inline-block';
            document.getElementById('statusDot').className = 'status-dot';
            document.getElementById('statusText').textContent = '시뮬레이션 모드';
        }

        function stopDetection() {
            socket.emit('stop');
            document.getElementById('btnStart').style.display = 'inline-block';
            document.getElementById('btnStop').style.display = 'none';
            document.getElementById('statusDot').className = 'status-dot idle';
            document.getElementById('statusText').textContent = '중지됨';
        }
    </script>
</body>
</html>
